<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Générateur de présentations — MedInfo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700&family=Public+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<!-- pptxgenjs (UMD) → window.PptxGenJS -->
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
/* ============================================================
   Générateur de présentations MedInfo — page autonome (iframe).
   Chrome aux couleurs MedInfo (bleu clinique, Fraunces / Public Sans).
   Aperçu de slide (.pv-*) en Georgia : fidèle au rendu PPTX (Keynote).
   ============================================================ */
:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --ink: #202124;
  --ink-2: #3c4043;
  --ink-3: #80868b;
  --rule: #e8eaed;
  --rule-2: #dadce0;
  --accent: #1a6fd4;
  --accent-deep: #14589f;
  --accent-soft: #e8f0fe;
  --danger: #c5221f;
  --warn-bg: #fff7ed;
  --warn-line: #fed7aa;
  --warn-ink: #9a3412;
  --radius: 10px;
  --serif: Georgia, "Times New Roman", serif;      /* aperçu = rendu PPTX */
  --brand-serif: "Fraunces", Georgia, serif;        /* titres chrome MedInfo */
  --sans: "Public Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}
* , *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--sans); color: var(--ink); background: var(--bg);
  line-height: 1.5; font-size: 14px; -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; }

/* ---------- Header ---------- */
.mip-header {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 20px; background: var(--surface);
  border-bottom: 1px solid var(--rule); position: sticky; top: 0; z-index: 20; flex-wrap: wrap;
}
.mip-brand { display: flex; flex-direction: column; }
.mip-brand b { font-family: var(--brand-serif); font-size: 19px; font-weight: 600; letter-spacing: -.01em; }
.mip-brand span { font-size: 11px; color: var(--ink-3); letter-spacing: .3px; }
.mip-tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: var(--radius); }
.mip-tab { border: 0; background: transparent; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--ink-2); cursor: pointer; }
.mip-tab.is-active { background: var(--surface); color: var(--accent-deep); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.mip-spacer { flex: 1; }

/* ---------- Buttons ---------- */
.mip-btn { border: 1px solid var(--rule-2); background: var(--surface); color: var(--ink); padding: 9px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
.mip-btn:hover { border-color: var(--ink-3); }
.mip-btn:disabled { opacity: .5; cursor: not-allowed; }
.mip-btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.mip-btn-primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
.mip-btn-sm { padding: 5px 9px; font-size: 12px; }
.mip-btn-danger:hover { border-color: var(--danger); color: var(--danger); }

/* ---------- Cloud (autosave + bibliothèque) ---------- */
.mip-cloud { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.mip-save { font-size: 12px; color: var(--ink-3); min-width: 96px; text-align: right; }
.mip-save[data-st="saved"] { color: #1e8e3e; }
.mip-save[data-st="saving"] { color: var(--accent); }
.mip-save[data-st="error"] { color: var(--danger); }
.mip-save[data-st="offline"] { color: var(--ink-3); }
.mip-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; }
.mip-modal { width: 100%; max-width: 520px; max-height: 80vh; display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--rule); border-radius: 12px; box-shadow: 0 14px 40px -12px rgba(0,0,0,.3); overflow: hidden; }
.mip-modal-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--rule); }
.mip-modal-head h3 { font-family: var(--brand-serif); font-weight: 600; font-size: 16px; margin: 0; }
.mip-lib-list { overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.mip-lib-row { display: flex; align-items: center; gap: 6px; border: 1px solid var(--rule); border-radius: 8px; background: var(--surface); }
.mip-lib-row.is-active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.mip-lib-open { flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; background: transparent; border: 0; cursor: pointer; padding: 10px 12px; text-align: left; min-width: 0; }
.mip-lib-title { font-size: 13.5px; font-weight: 600; color: var(--ink); max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mip-lib-meta { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .3px; }
.mip-lib-row .mip-iconbtn { margin-right: 6px; }

/* ---------- Settings bar ---------- */
.mip-settings { background: var(--surface); border-bottom: 1px solid var(--rule); padding: 14px 20px; }
.mip-settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px 20px; }
.mip-field { display: flex; flex-direction: column; gap: 5px; }
.mip-field > label { font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; color: var(--ink-3); }
.mip-input, .mip-textarea, .mip-select { border: 1px solid var(--rule-2); border-radius: 7px; padding: 8px 10px; font-size: 13px; font-family: inherit; color: var(--ink); background: var(--surface); width: 100%; }
.mip-textarea { resize: vertical; min-height: 64px; line-height: 1.4; }
.mip-input:focus, .mip-textarea:focus, .mip-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.mip-hint { font-size: 11px; color: var(--ink-3); }

.mip-themes { display: flex; gap: 8px; flex-wrap: wrap; }
.mip-theme-chip { border: 1.5px solid var(--rule-2); border-radius: 8px; padding: 8px 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; background: var(--surface); font-size: 12px; font-weight: 600; }
.mip-theme-chip.is-active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.mip-swatch { width: 26px; height: 18px; border-radius: 4px; display: inline-flex; overflow: hidden; border: 1px solid rgba(0,0,0,.1); }
.mip-swatch i { display: block; height: 100%; }

.mip-seg { display: inline-flex; border: 1px solid var(--rule-2); border-radius: 7px; overflow: hidden; }
.mip-seg button { border: 0; background: var(--surface); padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--ink-2); cursor: pointer; }
.mip-seg button.is-active { background: var(--accent); color: #fff; }
.mip-seg button + button { border-left: 1px solid var(--rule-2); }

/* ---------- Main layout ---------- */
.mip-main { display: grid; grid-template-columns: minmax(0, 1fr) minmax(340px, 500px); gap: 0; align-items: start; }
@media (max-width: 980px) { .mip-main { grid-template-columns: 1fr; } }
.mip-left { padding: 18px 20px; min-width: 0; }
.mip-right { padding: 18px 20px; position: sticky; top: 64px; }

/* ---------- Slide list ---------- */
.mip-section-title { font-family: var(--brand-serif); font-size: 17px; margin: 0 0 10px; font-weight: 600; }
.mip-slidelist { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.mip-slide-row { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border: 1px solid var(--rule); border-radius: 8px; background: var(--surface); cursor: pointer; }
.mip-slide-row.is-active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.mip-slide-num { font-size: 11px; color: var(--ink-3); width: 22px; font-variant-numeric: tabular-nums; }
.mip-slide-type { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; color: var(--accent); }
.mip-slide-label { font-size: 13px; color: var(--ink); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mip-slide-actions { display: flex; gap: 2px; }
.mip-iconbtn { border: 0; background: transparent; cursor: pointer; color: var(--ink-3); padding: 4px 6px; border-radius: 6px; font-size: 13px; line-height: 1; }
.mip-iconbtn:hover { background: var(--bg); color: var(--ink); }
.mip-iconbtn:disabled { opacity: .35; cursor: not-allowed; }
.mip-addrow { display: flex; gap: 8px; align-items: center; margin-bottom: 18px; }

/* ---------- Editor ---------- */
.mip-editor { border: 1px solid var(--rule); border-radius: var(--radius); background: var(--surface); padding: 16px; }
.mip-editor-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
.mip-editor-head h3 { font-family: var(--brand-serif); font-weight: 600; font-size: 16px; margin: 0; }
.mip-editor-hint { font-size: 11px; color: var(--ink-3); max-width: 60%; text-align: right; }
.mip-fields { display: flex; flex-direction: column; gap: 14px; }
.mip-list-item, .mip-stat-item { display: flex; gap: 8px; align-items: flex-start; }
.mip-list-item { margin-bottom: 6px; }

/* ---------- AI chat ---------- */
.mip-chat { display: flex; flex-direction: column; height: calc(100vh - 250px); min-height: 380px; }
.mip-chat-log { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 4px; }
.mip-msg { padding: 11px 13px; border-radius: 12px; font-size: 13.5px; max-width: 92%; white-space: pre-wrap; }
.mip-msg-user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
.mip-msg-ai { align-self: flex-start; background: var(--surface); border: 1px solid var(--rule); border-bottom-left-radius: 3px; }
.mip-msg-meta { font-size: 10px; opacity: .7; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
.mip-msg-deck { margin-top: 8px; font-size: 11px; color: var(--accent-deep); font-weight: 700; display: inline-flex; gap: 6px; align-items: center; }
.mip-chat-input { display: flex; gap: 8px; margin-top: 12px; }
.mip-chat-input .mip-textarea { min-height: 48px; }
.mip-chat-empty { color: var(--ink-2); font-size: 13.5px; background: var(--surface); border: 1px dashed var(--rule-2); border-radius: 10px; padding: 16px; }
.mip-chat-empty b { font-family: var(--brand-serif); font-weight: 600; }
.mip-quick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.mip-quick button { font-size: 12px; padding: 6px 10px; border: 1px solid var(--rule-2); border-radius: 999px; background: var(--surface); cursor: pointer; color: var(--ink-2); }
.mip-quick button:hover { border-color: var(--accent); color: var(--accent); }
.mip-quick button:disabled { opacity: .5; cursor: not-allowed; }
.mip-disclaimer { font-size: 11px; color: var(--ink-3); margin-top: 10px; line-height: 1.5; }

.mip-banner { font-size: 12px; padding: 9px 12px; border-radius: 8px; margin-bottom: 12px; }
.mip-banner-warn { background: var(--warn-bg); border: 1px solid var(--warn-line); color: var(--warn-ink); }
.mip-banner-info { background: var(--accent-soft); border: 1px solid #c5dbf8; color: var(--accent-deep); }

/* ---------- Preview ---------- */
.mip-preview-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.mip-preview-head h3 { font-family: var(--brand-serif); font-weight: 600; font-size: 16px; margin: 0; }
.mip-thumbs { display: flex; flex-direction: column; gap: 12px; max-height: calc(100vh - 150px); overflow-y: auto; padding: 2px; }

.mip-slide { position: relative; width: 100%; aspect-ratio: 13.3 / 7.5; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.12); border: 1px solid rgba(0,0,0,.06); container-type: inline-size; }
.mip-slide .pv { position: absolute; inset: 0; padding: 5.2cqw 5.2cqw; display: flex; flex-direction: column; }
.mip-slide .pv-kicker { font-size: 2.2cqw; letter-spacing: .35em; font-weight: 700; }
.mip-slide .pv-title { font-family: var(--serif); font-size: 5.6cqw; line-height: 1.1; }
.mip-slide .pv-sub { font-family: var(--serif); font-style: italic; font-size: 3cqw; }
.mip-slide .pv-label { font-size: 2.3cqw; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; }
.mip-slide .pv-h { font-family: var(--serif); font-size: 4.6cqw; line-height: 1.12; }
.mip-slide .pv-body { font-size: 2.7cqw; line-height: 1.35; }
.mip-slide .pv-tick { width: 6cqw; height: .9cqw; border-radius: 1px; }
.mip-slide .pv-rule { height: 1px; width: 100%; }
.mip-slide ul.pv-ul { margin: 0; padding-left: 3.2cqw; }
.mip-slide ul.pv-ul li { font-size: 2.7cqw; line-height: 1.5; }
.mip-slide ol.pv-ul { margin: 0; padding-left: 3.2cqw; }
.mip-slide .pv-footer { position: absolute; left: 5.2cqw; right: 5.2cqw; bottom: 3cqw; display: flex; justify-content: space-between; font-size: 1.9cqw; }
.mip-slide .pv-big { font-family: var(--serif); font-size: 24cqw; line-height: .9; }
.mip-slide .pv-statrow { display: flex; gap: 3cqw; align-items: flex-start; }
.mip-slide .pv-stat { flex: 1; text-align: center; }
.mip-slide .pv-stat b { font-family: var(--serif); font-size: 9cqw; font-weight: 400; display: block; }
.mip-slide .pv-stat span { font-size: 2cqw; letter-spacing: .15em; text-transform: uppercase; }
.mip-slide .pv-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2.6cqw; flex: 1; }
.mip-slide .pv-card { border-radius: 3px; padding: 2.6cqw; position: relative; overflow: hidden; }
.mip-slide .pv-card .bar { position: absolute; left: 0; top: 0; bottom: 0; width: 1cqw; }
.mip-slide .pv-card b { font-family: var(--serif); font-size: 3.2cqw; font-weight: 400; display: block; margin-bottom: 1cqw; }
.mip-slide .pv-card p { font-size: 2.2cqw; margin: 0; }
.mip-slide table.pv-table { border-collapse: collapse; width: 100%; font-size: 2.2cqw; }
.mip-slide table.pv-table td { padding: 1.4cqw 1.6cqw; }
.mip-slide .pv-ph { flex: 1; border: 1.5px dashed; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 2.2cqw; letter-spacing: .2em; text-transform: uppercase; }
.mip-slide .pv-numwm { position: absolute; right: 4cqw; bottom: -2cqw; font-family: var(--serif); font-style: italic; font-size: 48cqw; opacity: .18; line-height: 1; }
</style>
</head>

<script>
"use strict";
/* ============================================================================
 * MODULE INLINÉ — Générateur de présentations MedInfo.
 * Source : medinfo-generateur-presentations (Hugo Bettembourg), porté en page
 * autonome self-contained pour intégration en iframe dans l'app Expo/RN-Web.
 * ========================================================================== */

/* ---------------- Token d'auth (transmis par le parent, même origine) -------- */
let authToken = null;
window.addEventListener("message", (event) => {
  if (event.origin !== window.location.origin) return;
  const data = event.data || {};
  if (data.type === "medinfo:auth") onTokenReceived(data.token || null);
});
// Demande le token dès le chargement (course parent/iframe).
try { window.parent.postMessage({ type: "medinfo:auth-request" }, window.location.origin); } catch (e) {}

/* ============================== CANVAS / THEMES ============================= */
const CANVAS = { W: 13.3, H: 7.5, MARGIN: 0.7 };
const FONTS_DEFAULT = { serif: "Georgia", sans: "Helvetica Neue" };

const THEMES = {
  v1: {
    meta: { id: "v1", name: "V1 — Ivoire / Bordeaux", mode: "light", description: "Éditorial scientifique sobre, esprit NEJM print." },
    fonts: { ...FONTS_DEFAULT },
    c: { pageBg: "F8F6F0", ink: "1B2838", inkSecondary: "5A6470", inkMuted: "9CA5AF", accent: "8B1E2D", accentSoft: "C9A9A0", card: "EFEBE2", cardSoft: "F2EEE6", rule: "D8D2C5", white: "FFFFFF", onAccent: "FFFFFF" },
    section: { bg: "1B2838", ink: "F8F6F0", inkSecondary: "B8C2CE", inkMuted: "8090A0", accent: "B5485A", rule: "3A4A5C" },
  },
  v2: {
    meta: { id: "v2", name: "V2 — Ivoire / Sarcelle (hero)", mode: "light", description: "Éditorial enrichi de patterns hero. Le plus polyvalent." },
    fonts: { ...FONTS_DEFAULT },
    c: { pageBg: "F8F6F0", ink: "1B2838", inkSecondary: "5A6470", inkMuted: "9CA5AF", accent: "1B5E5E", accentSoft: "B5D4D2", card: "EFEBE2", cardSoft: "F2EEE6", rule: "D8D2C5", white: "FFFFFF", onAccent: "FFFFFF" },
    section: { bg: "1B2838", ink: "F8F6F0", inkSecondary: "B8C2CE", inkMuted: "8090A0", accent: "2A6F6F", rule: "3A4A5C" },
  },
  v3: {
    meta: { id: "v3", name: "V3 — Sombre / Mandarine", mode: "dark", description: "Fond bleu nuit, accents mandarine. Conférence en salle obscure." },
    fonts: { ...FONTS_DEFAULT },
    c: { pageBg: "0F1A2A", ink: "F5F1E8", inkSecondary: "B8C2CE", inkMuted: "6B7A8A", accent: "E89B5C", accentSoft: "8B6F50", card: "1A2A3D", cardSoft: "223349", rule: "2C3E54", white: "F5F1E8", onAccent: "0F1A2A", inverted: "F5F1E8", inkOnLight: "0F1A2A" },
    section: { bg: "0B1422", ink: "F5F1E8", inkSecondary: "B8C2CE", inkMuted: "6B7A8A", accent: "E89B5C", rule: "2C3E54" },
  },
};
const THEME_LIST = Object.values(THEMES).map((t) => t.meta);
const getTheme = (id) => THEMES[id] || THEMES.v2;
const resolveFonts = (theme, options = {}) => ({ serif: options.fontSerif || theme.fonts.serif, sans: options.fontSans || theme.fonts.sans });

/* ================================ SCHEMA =================================== */
const SLIDE_TYPES = {
  cover: { label: "Couverture", hint: "Titre principal, sous-titre, bloc auteur. Toujours en première position.", fields: [
    { key: "kicker", kind: "text", label: "Sur-titre (kicker)", placeholder: "PRÉSENTATION MÉDICALE" },
    { key: "title", kind: "textarea", label: "Titre principal", placeholder: "Titre de la présentation" },
    { key: "subtitle", kind: "textarea", label: "Sous-titre", placeholder: "Une phrase qui situe le sujet" },
    { key: "typeLabel", kind: "text", label: "Type (bas droite)", placeholder: "Cas clinique · Recherche · Topo" },
  ], blank: () => ({ type: "cover", kicker: "PRÉSENTATION MÉDICALE", title: "Titre de la présentation", subtitle: "Sous-titre — précision sur le sujet, le contexte ou la question traitée.", typeLabel: "Cas clinique · Recherche · Topo" }) },
  section: { label: "Intercalaire", hint: "Séparateur de partie : grand numéro, titre de section. Fond sombre.", fields: [
    { key: "numeral", kind: "text", label: "Numéro / chiffre romain", placeholder: "I" },
    { key: "title", kind: "textarea", label: "Titre de section", placeholder: "Cas clinique" },
    { key: "subtitle", kind: "textarea", label: "Sous-titre (option.)", placeholder: "Présentation et raisonnement" },
  ], blank: () => ({ type: "section", numeral: "I", title: "Titre de section", subtitle: "" }) },
  agenda: { label: "Plan / sommaire", hint: "Liste des sections, en colonnes.", fields: [
    { key: "title", kind: "text", label: "Titre", placeholder: "Plan de la présentation" },
    { key: "subtitle", kind: "text", label: "Sous-titre (option.)", placeholder: "Trois temps clairs." },
    { key: "items", kind: "list", label: "Sections (une par ligne)" },
  ], blank: () => ({ type: "agenda", title: "Plan de la présentation", subtitle: "Trois temps clairs. Un message principal par section.", items: ["Le cas — présentation et raisonnement", "Les données — ce que dit la littérature", "Synthèse — implications pratiques"] }) },
  bullets: { label: "Puces (action title)", hint: "Titre = conclusion de la slide. 3 à 6 puces denses.", fields: [
    { key: "label", kind: "text", label: "Étiquette de section", placeholder: "Cas · Examen" },
    { key: "title", kind: "textarea", label: "Titre (action title)", placeholder: "Ce que la slide démontre" },
    { key: "items", kind: "list", label: "Puces (une par ligne)" },
    { key: "source", kind: "text", label: "Source (footer, option.)", placeholder: "Auteur, Journal, année" },
  ], blank: () => ({ type: "bullets", label: "Section", title: "Titre qui énonce la conclusion de la slide", items: ["Premier point dense et précis", "Deuxième point", "Troisième point"], source: "" }) },
  prose: { label: "Texte rédigé", hint: "Mode phrases : un titre + un ou deux paragraphes.", fields: [
    { key: "label", kind: "text", label: "Étiquette de section", placeholder: "Contexte" },
    { key: "title", kind: "textarea", label: "Titre (action title)", placeholder: "Idée principale" },
    { key: "body", kind: "textarea", label: "Texte (paragraphes)", placeholder: "Rédigé, fluide, dense." },
    { key: "source", kind: "text", label: "Source (footer, option.)", placeholder: "" },

  }
  if (t === "image") {

    return slideEl(pv(h("div", { class: "pv-label", style: "color:" + hx(p.accent) }, slide.label || ""),
      h("div", { class: "pv-h", style: "color:" + hx(p.ink) + ";margin:1cqw 0 1.6cqw" }, slide.title || ""),

    h("div", { style: "flex:1" }), h("div", { class: "pv-rule", style: "background:" + hx(p.rule) }),

  const items = Array.isArray(slide.items) ? slide.items : [];

function previewEl() {
  const slides = state.deck.slides;

  return h("div", {}, h("div", { class: "mip-preview-head" }, h("h3", {}, "Aperçu"), h("span", { class: "mip-hint" }, slides.length + " slides · approximation")), h("div", { class: "mip-thumbs" }, ...thumbs));

/* ----- Liste de slides ----- */
let addType = "bullets";
function slideListEl() {
  const slides = state.deck.slides;
  const rows = slides.map((s, i) => {
    const def = SLIDE_TYPES[s.type] || { label: s.type };
    const title = s.title || s.headline || s.text || def.label;
    const actions = h("span", { class: "mip-slide-actions", onclick: (e) => e.stopPropagation() },
      h("button", { class: "mip-iconbtn", title: "Monter", onclick: () => move(i, -1), disabled: i === 0 }, "↑"),
      h("button", { class: "mip-iconbtn", title: "Descendre", onclick: () => move(i, 1), disabled: i === slides.length - 1 }, "↓"),
      h("button", { class: "mip-iconbtn mip-btn-danger", title: "Supprimer", onclick: () => del(i) }, "✕"));
    return h("div", { class: "mip-slide-row" + (i === state.sel ? " is-active" : ""), onclick: () => { state.sel = i; render(); } }, h("span", { class: "mip-slide-num" }, i + 1), h("span", { class: "mip-slide-type" }, def.label), h("span", { class: "mip-slide-label" }, title), actions);
  });

  return h("div", {}, h("h2", { class: "mip-section-title" }, "Slides"), h("div", { class: "mip-slidelist" }, ...rows), h("div", { class: "mip-addrow" }, sel, h("button", { class: "mip-btn mip-btn-sm", onclick: () => add(addType) }, "+ Ajouter la slide")));

function add(type) { const at = Math.min(state.sel + 1, state.deck.slides.length); state.deck.slides.splice(at, 0, createSlide(type)); state.sel = at; render(); }

/* ----- Mode IA ----- */
let aiDraft = "";
function aiChatEl() {
  const log = h("div", { class: "mip-chat-log" });
  if (state.aiHistory.length === 0) {
    log.append(h("div", { class: "mip-chat-empty" },
      h("b", {}, "Co-construction avec un médecin senior."),
      h("p", { style: "margin:8px 0 0" }, "Décris le sujet, le format et le temps de parole. Le modèle propose une structure complète (action titles, sources, take-home), puis tu l'affines tour par tour."),
      h("p", { style: "margin:8px 0 0;font-size:12px;color:var(--ink-3)" }, "Le deck généré reste éditable dans le mode manuel.")));
  } else {
    for (const m of state.aiHistory) {
      const msg = h("div", { class: "mip-msg " + (m.role === "user" ? "mip-msg-user" : "mip-msg-ai") }, h("div", { class: "mip-msg-meta" }, m.role === "user" ? "Vous" : "Co-auteur"), m.content);
      if (m.deckUpdated) msg.append(h("div", { class: "mip-msg-deck" }, "↻ Deck régénéré et appliqué"));
      log.append(msg);
    }
  }
  if (state.aiBusy) log.append(h("div", { class: "mip-msg mip-msg-ai" }, h("div", { class: "mip-msg-meta" }, "Co-auteur"), "Rédaction en cours…"));
  const ta = h("textarea", { class: "mip-textarea", placeholder: "Décris ou affine la présentation… (Ctrl/⌘+Entrée pour envoyer)", disabled: state.aiBusy });
  ta.value = aiDraft; ta.addEventListener("input", (e) => { aiDraft = e.target.value; });
  ta.addEventListener("keydown", (e) => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); sendAI(aiDraft); } });
  const quick = ["Génère une première version sur ce sujet.", "Resserre chaque slide.", "Ajoute une slide de limites méthodologiques.", "Vérifie les sources et signale ce qui est à vérifier."];
  const quickRow = h("div", { class: "mip-quick" }, ...quick.map((q) => h("button", { onclick: () => sendAI(q), disabled: state.aiBusy }, q)));
  return h("div", {},
    h("div", { class: "mip-banner mip-banner-info" }, "Le mode IA construit le plan et le contenu, et cite les sources. Il ne remplace pas ta vérification : contrôle toujours les données chiffrées et les références avant diffusion."),
    h("div", { class: "mip-chat" }, log, quickRow,
      h("div", { class: "mip-chat-input" }, ta, h("button", { class: "mip-btn mip-btn-primary", onclick: () => sendAI(aiDraft), disabled: state.aiBusy }, "Envoyer")),
      h("div", { class: "mip-disclaimer" }, "Réponses générées par une IA — information médicale générale destinée à des professionnels/étudiants. Vérifie chaque donnée et chaque référence.")));
}
async function sendAI(text) {
  const content = (text || "").trim();
  if (!content || state.aiBusy) return;
  aiDraft = "";
  state.aiHistory.push({ role: "user", content });
  state.aiBusy = true; render();
  const cover = state.deck.slides.find((s) => s.type === "cover");
  const aiOptions = { theme: state.deck.theme, slideCount: state.slideCount, density: state.deck.options.density, audience: state.deck.options.audience || "", presentationType: (cover && cover.typeLabel) || "" };
  try {
    const { message, deck: newDeck, parseError, raw } = await callAI({ history: state.aiHistory, deck: state.deck, options: aiOptions });
    if (newDeck) { state.deck = normalizeDeck(newDeck); state.sel = Math.min(state.sel, state.deck.slides.length - 1); }
    let msg = message || (newDeck ? "Deck mis à jour." : raw || "(réponse vide)");
    if (parseError) msg += "\n\n⚠︎ JSON invalide (" + parseError + "). Deck inchangé.";
    state.aiHistory.push({ role: "assistant", content: msg, deckUpdated: !!newDeck });
  } catch (e) {
    state.aiHistory.push({ role: "assistant", content: "Échec de l'appel IA : " + (e.message || e) });
  } finally {
    state.aiBusy = false; render();
  }
}

/* ----- Export ----- */
async function exportPptx(btn) {
  if (!window.PptxGenJS) { alert("pptxgenjs n'est pas chargé (CDN bloqué ?)."); return; }
  const old = btn.textContent; btn.textContent = "Génération…"; btn.disabled = true;
  try { await downloadPptx(window.PptxGenJS, state.deck); }
  catch (e) { alert("Export impossible : " + (e.message || e)); }
  finally { btn.textContent = old; btn.disabled = false; }
}

  const setMeta = (k) => (e) => { meta[k] = e.target.value; if (k !== "title") render(); else scheduleAutosave(); };

    return h("button", { class: "mip-theme-chip" + (state.deck.theme === t.id ? " is-active" : ""), title: t.description, onclick: () => { state.deck.theme = t.id; render(); } }, sw, t.name);
  });

    field("Auteur", "author", "Prénom Nom"),
    field("Affiliation", "affiliation", "Service · Faculté"),
    field("Contact", "contact", "prenom.nom@…"),
    h("div", { class: "mip-field" }, h("label", {}, "Thème"), h("div", { class: "mip-themes" }, ...themeChips)),
    h("div", { class: "mip-field" }, h("label", {}, "Densité du texte"), h("div", { class: "mip-seg" }, ...densBtns)),
    h("div", { class: "mip-field" }, h("label", {}, "Nombre de slides visé (IA)"), h("input", { class: "mip-input", type: "number", min: 4, max: 40, value: state.slideCount, oninput: (e) => { state.slideCount = parseInt(e.target.value || "10", 10) || 10; } })),
    h("div", { class: "mip-field" }, h("label", {}, "Public visé (IA)"), h("input", { class: "mip-input", value: opt.audience || "", placeholder: "Co-internes, staff…", oninput: (e) => { opt.audience = e.target.value; scheduleAutosave(); } }))));
}

/* ----- Historique cloud (autosave + bibliothèque) ----- */
const SAVE_LABELS = { idle: "", saving: "Enregistrement…", saved: "Enregistré ✓", error: "Échec de l'enregistrement", offline: "Hors connexion" };
let lastSavedContent = "";
let autosaveTimer = null;
let saving = false;

function currentContent() { return JSON.stringify({ deck: state.deck, ai: state.aiHistory }); }
function isDirty() { return !!authToken && currentContent() !== lastSavedContent; }
function fmtDate(s) { try { return new Date(s).toLocaleDateString("fr-FR", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" }); } catch (e) { return ""; } }

async function apiFetch(path, opts) {
  opts = opts || {};
  const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
  if (authToken) headers.Authorization = "Bearer " + authToken;
  return fetch(path, Object.assign({}, opts, { headers }));
}
// Met à jour l'indicateur SANS re-rendre (préserve le focus pendant la saisie).
function setSaveStatus(s) {
  state.saveStatus = s;
  const el = document.getElementById("mip-save-status");
  if (el) { el.textContent = SAVE_LABELS[s] || ""; el.setAttribute("data-st", s); }
}
function scheduleAutosave() {
  if (!authToken) { setSaveStatus("offline"); return; }
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => saveDeck(), 1200);
}
// Filet périodique — inutile (et la sérialisation du deck est coûteuse) tant que l'onglet/iframe est masqué.
function autosaveTick() { if (document.visibilityState === "visible" && isDirty() && !saving) saveDeck(); }

async function saveDeck(opts) {
  opts = opts || {};
  if (!authToken) { setSaveStatus("offline"); return; }
  if (saving) return;
  const content = currentContent();
  if (state.deckId && content === lastSavedContent) { setSaveStatus("saved"); return; }
  saving = true; setSaveStatus("saving");
  try {
    const payload = { id: state.deckId, title: state.deck.meta.title, theme: state.deck.theme, deck: state.deck, aiHistory: state.aiHistory };
    const res = await apiFetch("/api/presentations", { method: "POST", body: JSON.stringify(payload), keepalive: !!opts.keepalive });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    state.deckId = data.id || state.deckId;
    lastSavedContent = content;
    setSaveStatus("saved");
  } catch (e) { setSaveStatus("error"); }
  finally { saving = false; }
}

async function refreshLibrary() {
  if (!authToken) return;
  try {
    const res = await apiFetch("/api/presentations");
    if (!res.ok) return;
    const data = await res.json();
    state.library = Array.isArray(data.items) ? data.items : [];
    state.libraryLoaded = true;
    if (state.libraryOpen) render();
    const cnt = document.getElementById("mip-lib-count");
    if (cnt) cnt.textContent = state.library.length ? " (" + state.library.length + ")" : "";
  } catch (e) {}
}
async function loadDeck(id) {
  if (!authToken) return;
  setSaveStatus("saving");
  try {
    const res = await apiFetch("/api/presentations?id=" + encodeURIComponent(id));
    if (!res.ok) throw new Error();
    const row = (await res.json()).deck;
    state.deck = normalizeDeck(row.deck);
    state.aiHistory = Array.isArray(row.ai_history) ? row.ai_history : [];
    state.deckId = row.id; state.sel = 0; state.libraryOpen = false;
    lastSavedContent = currentContent();
    setSaveStatus("saved"); render();
  } catch (e) { setSaveStatus("error"); }
}
async function deleteDeck(id) {
  if (!authToken) return;
  try {
    const res = await apiFetch("/api/presentations?id=" + encodeURIComponent(id), { method: "DELETE" });
    if (!res.ok) return;
    if (state.deckId === id) { state.deckId = null; }
    await refreshLibrary(); render();
  } catch (e) {}
}
function newDeck() {
  state.deck = normalizeDeck(createBlankDeck("v2"));
  state.aiHistory = []; state.deckId = null; state.sel = 0; state.libraryOpen = false;
  lastSavedContent = currentContent(); // un deck vierge n'est pas sauvegardé tant qu'il n'est pas édité
  setSaveStatus("idle"); render();
}
function onTokenReceived(token) {
  authToken = token || null;
  if (authToken) { refreshLibrary(); if (isDirty()) scheduleAutosave(); else setSaveStatus("idle"); }
  else setSaveStatus("offline");
}

function libraryModal() {
  const items = state.library || [];
  const list = items.length
    ? items.map((it) => h("div", { class: "mip-lib-row" + (it.id === state.deckId ? " is-active" : "") },
        h("button", { class: "mip-lib-open", onclick: () => loadDeck(it.id) },
          h("span", { class: "mip-lib-title" }, it.title || "Sans titre"),
          h("span", { class: "mip-lib-meta" }, (it.theme || "") + " · " + fmtDate(it.updated_at))),
        h("button", { class: "mip-iconbtn mip-btn-danger", title: "Supprimer", onclick: () => deleteDeck(it.id) }, "✕")))
    : [h("p", { class: "mip-hint", style: "padding:10px" }, state.libraryLoaded ? "Aucune présentation enregistrée pour l'instant. Ton travail est sauvegardé automatiquement dès que tu modifies le deck." : "Chargement…")];
  return h("div", { class: "mip-modal-backdrop", onclick: () => { state.libraryOpen = false; render(); } },
    h("div", { class: "mip-modal", onclick: (e) => e.stopPropagation() },
      h("div", { class: "mip-modal-head" }, h("h3", {}, "Mes présentations"), h("button", { class: "mip-iconbtn", onclick: () => { state.libraryOpen = false; render(); } }, "✕")),
      h("div", { class: "mip-lib-list" }, ...list)));
}

/* ----- Render ----- */
function render() {
  app.innerHTML = "";
  const exportBtn = h("button", { class: "mip-btn mip-btn-primary" }, "⤓ Exporter en PPTX");
  exportBtn.addEventListener("click", () => exportPptx(exportBtn));
  const cloudBar = h("div", { class: "mip-cloud" },
    h("span", { id: "mip-save-status", class: "mip-save", "data-st": state.saveStatus }, SAVE_LABELS[state.saveStatus] || ""),
    h("button", { class: "mip-btn mip-btn-sm", onclick: () => { state.libraryOpen = true; refreshLibrary(); render(); } }, "Mes présentations", h("span", { id: "mip-lib-count" }, state.library.length ? " (" + state.library.length + ")" : "")),
    h("button", { class: "mip-btn mip-btn-sm", onclick: newDeck }, "Nouveau"));
  const header = h("header", { class: "mip-header" },
    h("div", { class: "mip-brand" }, h("b", {}, "Générateur de présentations"), h("span", {}, "Slides médicales prêtes pour Keynote · export PPTX")),
    h("div", { class: "mip-tabs" },
      h("button", { class: "mip-tab" + (state.tab === "manuel" ? " is-active" : ""), onclick: () => { state.tab = "manuel"; render(); } }, "Mode manuel"),
      h("button", { class: "mip-tab" + (state.tab === "ia" ? " is-active" : ""), onclick: () => { state.tab = "ia"; render(); } }, "Mode IA")),
    h("div", { class: "mip-spacer" }), cloudBar, exportBtn);
  const left = h("div", { class: "mip-left" });
  if (state.tab === "manuel") left.append(slideListEl(), editorEl()); else left.append(aiChatEl());
  const main = h("div", { class: "mip-main" }, left, h("div", { class: "mip-right" }, previewEl()));
  app.append(header, configEl(), main);
  if (state.libraryOpen) app.append(libraryModal());
  scheduleAutosave();
}
render();
// Sauvegarde de secours : périodique + au départ de la page (fermeture/onglet).
lastSavedContent = currentContent();
setInterval(autosaveTick, 4000);
window.addEventListener("pagehide", () => { if (isDirty()) saveDeck({ keepalive: true }); });
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden" && isDirty()) saveDeck({ keepalive: true }); });
</script>
