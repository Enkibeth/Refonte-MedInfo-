<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Créateur de CV — MedInfo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
<!-- Export PDF « distribuable » : on génère le PDF NOUS-MÊMES (pas window.print()) → aucun
     en-tête/pied de page du navigateur (URL, n° de page), plein cadre A4, jamais de rognage. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Import d'un CV existant : extraction de texte PDF (pdf.js) et Word (mammoth) côté client. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script>
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
<style>
  :root {
    --accent: #2563eb;        /* petrol700 */
    --accent-deep: #1e40af;   /* petrol800 */
    --accent-soft: #eef4ff;   /* petrol50 */
    --accent-tint: #d9e6ff;   /* petrol100 */
    --vivid: #0067ff;         /* blue600 (CTA) */
    --vivid-deep: #0052d6;
    --ink: #0e1626;
    --ink2: #3a474e;
    --muted: #5d6b80;
    --surface: #ffffff;
    --bg: #f7f9fc;
    --line: #dde3ed;
    --line-fine: #eaeef5;
    --danger: #c42233;
    --danger-soft: #fbeaec;
    --success: #157f50;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Public Sans', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
  }
  h1, h2, h3 { margin: 0; }
  button { font-family: inherit; cursor: pointer; }

  /* ── Top toolbar ───────────────────────────────────────────── */
  .toolbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  .toolbar .grow { flex: 1; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: var(--surface); color: var(--ink2);
    font-size: 13px; font-weight: 600; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--vivid); border-color: var(--vivid); color: #fff; }
  .btn-primary:hover { background: var(--vivid-deep); border-color: var(--vivid-deep); color: #fff; }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-accent:hover { background: var(--accent-deep); border-color: var(--accent-deep); color: #fff; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .status { font-size: 12px; color: var(--muted); margin-left: 4px; }

  /* ── Two-pane layout ───────────────────────────────────────── */
  .layout { display: grid; grid-template-columns: minmax(360px, 460px) 1fr; gap: 0; height: calc(100vh - 57px); }
  .editor { overflow-y: auto; padding: 16px; border-right: 1px solid var(--line); background: var(--bg); }
  .previewWrap { overflow-y: auto; padding: 24px; background: #e9edf0; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .editor { border-right: none; border-bottom: 1px solid var(--line); }
    .previewWrap { transform-origin: top center; }
  }

  /* ── Editor cards ──────────────────────────────────────────── */
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .card > summary { list-style: none; cursor: pointer; padding: 12px 14px; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; color: var(--accent-deep); }
  .card > summary::-webkit-details-marker { display: none; }
  .card > summary::after { content: '⌄'; margin-left: auto; color: var(--muted); font-size: 16px; transition: transform .15s; }
  .card[open] > summary::after { transform: rotate(180deg); }
  .card .body { padding: 0 14px 14px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink2); margin-bottom: 4px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--ink);
    border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--surface);
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--vivid); }
  .field textarea { resize: vertical; min-height: 64px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .checkline { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink2); }
  .checkline input { width: auto; }
  .item { border: 1px solid var(--line-fine); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 10px; background: #fcfdfe; }
  .item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .item-head .ttl { font-weight: 700; font-size: 12px; color: var(--muted); flex: 1; }
  .iconbtn { border: 1px solid var(--line); background: var(--surface); border-radius: 6px; width: 28px; height: 28px; line-height: 1; color: var(--ink2); font-size: 14px; }
  .iconbtn:hover { border-color: var(--accent); color: var(--accent); }
  .iconbtn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .bullets .bl { display: flex; gap: 6px; margin-bottom: 6px; }
  .bullets .bl input { flex: 1; }
  .addrow { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--vivid); background: none; border: none; padding: 4px 0; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.45; }
  .photoPrev { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 1px solid var(--line); }

  /* ── A4 preview (gabarit « sidebar claire + liseré marine ») ──────────────
     Le fond gauche (liseré marine + bande claire) est peint via un dégradé sur
     .sheet : un fond posé sur un bloc qui déborde sur plusieurs pages CONTINUE à
     l'impression → la bande latérale se prolonge automatiquement en page 2. */
  :root { --cv-navy: #16235c; --cv-edge: #101c4b; --cv-side-bg: #eef1f7; --cv-link: #3f6fce; --cv-ink: #232323; --cv-rule: #cfd5e2; }
  .sheet {
    width: 210mm; min-height: 297mm; color: var(--cv-ink); flex: 0 0 auto;
    box-shadow: 0 6px 28px rgba(8,40,60,.18); display: flex;
    font-family: 'Segoe UI', 'Lato', system-ui, -apple-system, Roboto, Arial, sans-serif;
    font-size: 10pt; line-height: 1.42;
    background: linear-gradient(to right, var(--cv-edge) 0, var(--cv-edge) 8mm, var(--cv-side-bg) 8mm, var(--cv-side-bg) 62mm, #fff 62mm);
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .cv-side { width: 62mm; padding: 13mm 7mm 13mm 15mm; }
  .cv-main { flex: 1; padding: 13mm 13mm 13mm 10mm; }
  .cv-photo { width: 38mm; height: 38mm; border-radius: 4px; object-fit: cover; display: block; margin: 0 auto 9mm; }
  .cv-side h3, .cv-main h2 { color: var(--cv-navy); font-weight: 400; }
  .cv-side h3 { font-size: 14pt; margin: 0 0 4mm; padding-bottom: 2mm; border-bottom: 1px solid var(--cv-rule); }
  .cv-side .blk { margin-bottom: 9mm; }
  .cv-crow { display: flex; align-items: flex-start; gap: 3.5mm; margin-bottom: 3.5mm; font-size: 9.5pt; line-height: 1.35; color: var(--cv-ink); }
  .cv-crow svg { width: 4.6mm; height: 4.6mm; flex: 0 0 auto; margin-top: .4mm; fill: var(--cv-navy); }
  .cv-cert { margin-bottom: 4mm; }
  .cv-cert b { display: block; font-weight: 700; font-size: 9.5pt; color: var(--cv-ink); }
  .cv-cert span { font-size: 9pt; color: #3a3a3a; }
  .cv-int { display: flex; align-items: flex-start; gap: 3mm; margin-bottom: 2.5mm; font-size: 9.5pt; }
  .cv-int i { width: 2.6mm; height: 2.6mm; background: var(--cv-navy); flex: 0 0 auto; margin-top: 1.2mm; }
  .cv-lang { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3mm; font-size: 9.5pt; }
  .cv-dots { display: flex; gap: 1.4mm; }
  .cv-dots i { width: 2.6mm; height: 2.6mm; border-radius: 50%; background: var(--cv-navy); display: inline-block; }
  .cv-dots i.off { background: #c3c9d6; }
  .cv-name { font-size: 30pt; line-height: 1.02; color: var(--cv-navy); font-weight: 700; }
  .cv-headline { font-size: 11.5pt; color: #4a4a4a; margin-top: 2mm; margin-bottom: 8mm; }
  .cv-main h2 { font-size: 16pt; margin: 0 0 4mm; padding-bottom: 2mm; border-bottom: 1px solid var(--cv-rule); }
  .cv-section { margin-bottom: 8mm; }
  .cv-entry { margin-bottom: 5mm; break-inside: avoid; }
  .cv-entry .er { display: flex; justify-content: space-between; align-items: baseline; gap: 8mm; }
  .cv-entry .ti { font-weight: 700; font-size: 10pt; color: var(--cv-ink); }
  .cv-entry .inst { font-size: 10pt; color: var(--cv-link); margin-top: .4mm; }
  .cv-entry .sub { font-size: 10pt; color: var(--cv-ink); margin-top: .4mm; }
  .cv-entry .dt { font-weight: 700; font-size: 10pt; color: var(--cv-navy); white-space: nowrap; text-align: right; }
  .cv-entry ul { margin: 2mm 0 0; padding-left: 5mm; list-style: none; }
  .cv-entry li { font-size: 9.6pt; line-height: 1.4; margin-bottom: 1mm; position: relative; }
  .cv-entry li::before { content: ''; position: absolute; left: -4mm; top: 1.6mm; width: 1.5mm; height: 1.5mm; border-radius: 50%; background: var(--cv-navy); }
  .cv-entry p.desc { font-size: 9.6pt; line-height: 1.4; margin: 1.5mm 0 0; color: var(--cv-ink); }
  .cv-ref { margin-bottom: 4.5mm; break-inside: avoid; }
  .cv-ref b { display: block; font-weight: 700; font-size: 10pt; color: var(--cv-ink); }
  .cv-ref span { font-size: 10pt; color: var(--cv-link); }
  .empty-ph { color: #b7c0c6; font-style: italic; }

  /* ── AI review panel ───────────────────────────────────────── */
  .drawer { position: fixed; top: 0; right: 0; height: 100vh; width: 380px; max-width: 92vw; background: var(--surface); border-left: 1px solid var(--line); box-shadow: -8px 0 28px rgba(8,40,60,.14); transform: translateX(100%); transition: transform .22s ease; z-index: 40; display: flex; flex-direction: column; }
  .drawer.open { transform: translateX(0); }
  .drawer header { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
  .drawer header h2 { font-family: 'Fraunces', Georgia, serif; font-size: 16px; color: var(--accent-deep); }
  .drawer .scroll { flex: 1; overflow-y: auto; padding: 14px 16px; }
  .scorebar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .scoreval { font-family: 'Fraunces', serif; font-size: 30px; color: var(--accent); }
  .sugg { border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px; margin-bottom: 10px; }
  .sugg .tags { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; padding: 2px 7px; border-radius: 999px; background: var(--accent-soft); color: var(--accent-deep); }
  .tag.high { background: var(--danger-soft); color: var(--danger); }
  .tag.sec { background: var(--line-fine); color: var(--muted); }
  .sugg .ot { font-size: 12px; color: var(--muted); text-decoration: line-through; margin-bottom: 3px; }
  .sugg .st { font-size: 12.5px; color: var(--ink); background: #f0f7f2; border-left: 2px solid var(--success); padding: 4px 7px; border-radius: 4px; }
  .sugg .ex { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .sugg .acts { display: flex; gap: 6px; margin-top: 8px; }
  .sugg .acts .btn { padding: 5px 10px; font-size: 12px; }
  .issue { border-left: 3px solid var(--danger); background: var(--danger-soft); padding: 8px 10px; border-radius: 4px; margin-bottom: 8px; font-size: 12px; }
  .privacy { font-size: 11px; color: var(--muted); background: var(--accent-soft); border-radius: 8px; padding: 8px 10px; margin-bottom: 12px; line-height: 1.5; }
  .overlay { position: fixed; inset: 0; background: rgba(15,27,34,.35); z-index: 35; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* history modal */
  .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 50; }
  .modal.open { display: flex; }
  .modal .sheet2 { background: #fff; border-radius: var(--radius); width: 460px; max-width: 92vw; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 18px 50px rgba(8,40,60,.3); }
  .modal header { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; }
  .modal header h2 { font-family: 'Fraunces', serif; font-size: 16px; color: var(--accent-deep); flex: 1; }
  .modal .list { overflow-y: auto; padding: 8px; }
  .histrow { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 8px; }
  .histrow:hover { background: var(--accent-soft); }
  .histrow .nm { flex: 1; font-weight: 600; font-size: 13px; }
  .histrow .dt { font-size: 11px; color: var(--muted); }

  /* Bande latérale (liseré marine + fond clair). Masquée à l'écran (le dégradé de
     .sheet suffit) ; à l'impression elle devient un élément FIXE, que Chrome repeint
     sur CHAQUE page → la bande remplit toute la hauteur de toutes les pages, y compris
     la dernière (comme le gabarit de référence). */
  .cv-band { display: none; }

  /* ── Print : seul le CV ──────────────────────────────────── */
  @media print {
    @page { size: A4; margin: 0; }
    .toolbar, .editor, .drawer, .overlay, .modal, .previewWrap > .printNote { display: none !important; }
    /* Tout transparent → le papier (blanc) apparaît à droite et la bande FIXE apparaît à
       gauche sur chaque page. Un fond blanc opaque masquerait la bande (z-index négatif). */
    html, body { background: transparent; }
    .layout { display: block; height: auto; }
    .previewWrap { padding: 0; background: transparent; display: block; }
    /* On retire le dégradé de .sheet (il s'arrête avec le contenu) : la bande fixe prend le relais. */
    .sheet { box-shadow: none; width: 210mm; min-height: 297mm; margin: 0; background: transparent; }
    .cv-band {
      display: block; position: fixed; top: 0; bottom: 0; left: 0; width: 62mm; z-index: -1;
      background: linear-gradient(to right, var(--cv-edge) 0, var(--cv-edge) 8mm, var(--cv-side-bg) 8mm, var(--cv-side-bg) 62mm);
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
  }
  .printNote { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
  <div class="cv-band" aria-hidden="true"></div>
  <div class="toolbar">
    <button class="btn" id="btn-new">＋ Nouveau</button>
    <button class="btn" id="btn-import">⤒ Importer un CV</button>
    <input type="file" id="import-file" accept=".pdf,.docx,.txt,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain" style="display:none" />
    <button class="btn" id="btn-example">Charger un exemple</button>
    <button class="btn" id="btn-history">Mes CV</button>
    <button class="btn" id="btn-save">Sauvegarder</button>
    <span class="grow"></span>
    <span class="status" id="status"></span>
    <button class="btn btn-accent" id="btn-ai">✦ Relire avec IA</button>
    <button class="btn btn-primary" id="btn-pdf">⤓ Télécharger PDF</button>
  </div>

  <div class="layout">
    <aside class="editor" id="editor"></aside>
    <main class="previewWrap">
      <div class="printNote">Aperçu A4 — le PDF reprend exactement cette feuille (texte sélectionnable).</div>
      <div class="sheet" id="sheet"></div>
    </main>
  </div>

  <!-- AI drawer -->
  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer">
    <header>
      <h2>Relecture IA</h2>
      <span class="grow" style="flex:1"></span>
      <button class="iconbtn" id="ai-close">✕</button>
    </header>
    <div class="scroll" id="ai-body"></div>
  </aside>

  <!-- history modal -->
  <div class="modal" id="histModal">
    <div class="sheet2">
      <header><h2>Mes CV enregistrés</h2><button class="iconbtn" id="hist-close">✕</button></header>
      <div class="list" id="histList"></div>
    </div>
  </div>

<script>
(function () {
  'use strict';

  // ── Session token (postMessage depuis le wrapper natif) ──────────────────
  var authToken = null;
  window.addEventListener('message', function (e) {
    if (e.origin !== window.location.origin) return;
    var d = e.data || {};
    if (d.type === 'medinfo:auth') authToken = d.token || null;
  });
  try { window.parent.postMessage({ type: 'medinfo:auth-request' }, window.location.origin); } catch (_) {}

  // ── État ────────────────────────────────────────────────────────────────
  var LS_KEY = 'medinfo:cv:draft';
  var uid = function () { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) { var r = Math.random() * 16 | 0; var v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); }); };
  var serverId = null;       // id Supabase du CV courant (cloud)
  var dirty = false;

  function blankCv() {
    return {
      personalInfo: { firstName: '', lastName: '', headline: '', email: '', phone: '', city: '', country: '', nationality: '', website: '', photoUrl: '' },
      summary: '',
      experiences: [], education: [], researchProjects: [],
      references: [], certificates: [], languages: [], interests: [], personalProjects: []
    };
  }
  var cv = blankCv();

  function setStatus(t) { document.getElementById('status').textContent = t || ''; }

  // ── Persistance locale (filet hors-ligne) ────────────────────────────────
  function saveLocal() {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ serverId: serverId, cv: cv })); } catch (_) {}
  }
  function loadLocal() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return false;
      var p = JSON.parse(raw);
      if (p && p.cv) { cv = Object.assign(blankCv(), p.cv); serverId = p.serverId || null; return true; }
    } catch (_) {}
    return false;
  }

  // ── Helpers chemins (pour appliquer les suggestions IA) ───────────────────
  function getByPath(obj, path) {
    var parts = path.split('.'); var cur = obj;
    for (var i = 0; i < parts.length; i++) { if (cur == null) return undefined; cur = cur[parts[i]]; }
    return cur;
  }
  function setByPath(obj, path, val) {
    var parts = path.split('.'); var cur = obj;
    for (var i = 0; i < parts.length - 1; i++) { if (cur[parts[i]] == null) return false; cur = cur[parts[i]]; }
    cur[parts[parts.length - 1]] = val; return true;
  }

  // ── Marquage modifié + rendu + autosave debounce ──────────────────────────
  var saveTimer = null;
  function touch() {
    dirty = true; render(); saveLocal();
    setStatus('Modifié…');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () { if (authToken) saveCloud(true); }, 1500);
  }

  // ════════════════════════════════════════════════════════════════════════
  //  EDITOR
  // ════════════════════════════════════════════════════════════════════════
  function el(tag, attrs, children) {
    var n = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      if (k === 'class') n.className = attrs[k];
      else if (k === 'html') n.innerHTML = attrs[k];
      else if (k.slice(0, 2) === 'on') n.addEventListener(k.slice(2), attrs[k]);
      else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
    });
    (children || []).forEach(function (c) { if (c != null) n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    return n;
  }

  function input(label, value, oninput, attrs) {
    attrs = attrs || {};
    var i = el('input', Object.assign({ type: 'text', value: value || '' }, attrs));
    i.addEventListener('input', function () { oninput(i.value); });
    return el('div', { class: 'field' }, [el('label', null, [label]), i]);
  }
  function textarea(label, value, oninput) {
    var t = el('textarea', null, [value || '']);
    t.value = value || '';
    t.addEventListener('input', function () { oninput(t.value); });
    return el('div', { class: 'field' }, [el('label', null, [label]), t]);
  }

  function bulletsEditor(arr, owner) {
    owner.bullets = owner.bullets || [];
    var wrap = el('div', { class: 'bullets' });
    (owner.bullets || []).forEach(function (b, j) {
      var i = el('input', { type: 'text', value: b });
      i.addEventListener('input', function () { owner.bullets[j] = i.value; saveLocal(); renderPreview(); });
      var del = el('button', { class: 'iconbtn danger', title: 'Supprimer la ligne' }, ['✕']);
      del.addEventListener('click', function () { owner.bullets.splice(j, 1); touch(); });
      wrap.appendChild(el('div', { class: 'bl' }, [i, del]));
    });
    var add = el('button', { class: 'addrow' }, ['＋ Ajouter une ligne']);
    add.addEventListener('click', function () { owner.bullets.push(''); touch(); });
    return el('div', null, [wrap, add]);
  }

  // Carte générique pour une liste d'items (expériences, formation, etc.)
  function listCard(title, key, factory, renderItem, openDefault) {
    var card = el('details', { class: 'card' });
    if (openDefault) card.setAttribute('open', '');
    card.appendChild(el('summary', null, [title + ' (' + cv[key].length + ')']));
    var body = el('div', { class: 'body' });
    cv[key].forEach(function (it, idx) {
      var head = el('div', { class: 'item-head' }, [
        el('span', { class: 'ttl' }, ['#' + (idx + 1)]),
        mkMove(key, idx, -1), mkMove(key, idx, 1), mkDelete(key, idx)
      ]);
      body.appendChild(el('div', { class: 'item' }, [head].concat(renderItem(it, idx))));
    });
    var add = el('button', { class: 'addrow' }, ['＋ Ajouter']);
    add.addEventListener('click', function () { cv[key].push(factory()); touch(); });
    body.appendChild(add);
    card.appendChild(body);
    return card;
  }
  function mkMove(key, idx, dir) {
    var b = el('button', { class: 'iconbtn', title: dir < 0 ? 'Monter' : 'Descendre' }, [dir < 0 ? '↑' : '↓']);
    b.disabled = (dir < 0 && idx === 0) || (dir > 0 && idx === cv[key].length - 1);
    b.addEventListener('click', function () {
      var ni = idx + dir; var a = cv[key];
      var tmp = a[idx]; a[idx] = a[ni]; a[ni] = tmp; touch();
    });
    return b;
  }
  function mkDelete(key, idx) {
    var b = el('button', { class: 'iconbtn danger', title: 'Supprimer' }, ['🗑']);
    b.addEventListener('click', function () { if (confirm('Supprimer cet élément ?')) { cv[key].splice(idx, 1); touch(); } });
    return b;
  }

  // ════════════════════════════════════════════════════════════════════════
  //  PREVIEW (A4)
  // ════════════════════════════════════════════════════════════════════════
  function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }
  function ml(s) { return esc(s).replace(/\n/g, '<br>'); } // conserve les retours à la ligne d'une description

  // Format calqué sur le gabarit : « de {début} à {fin} », « de {début} à ce jour »,
  // ou « {début} » seul quand aucune fin n'est saisie.
  function dates(a, b, cur) {
    a = (a || '').trim(); b = (b || '').trim();
    if (cur && a) return 'de ' + a + ' à ce jour';
    if (a && b) return 'de ' + a + ' à ' + b;
    return a || b || '';
  }

  // Petites icônes de la colonne « Informations personnelles » (SVG inline, teinte marine).

    user: '<svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-5 0-9 2.5-9 6v2h18v-2c0-3.5-4-6-9-6Z"/></svg>',
    mail: '<svg viewBox="0 0 24 24"><path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm9 7 8-5H4l8 5Zm0 2L4 9v8h16V9l-8 5Z"/></svg>',
    phone: '<svg viewBox="0 0 24 24"><path d="M6.6 10.8a15 15 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11 11 0 0 0 3.4.55 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11 11 0 0 0 .55 3.4 1 1 0 0 1-.25 1l-2.2 2.4Z"/></svg>',
    home: '<svg viewBox="0 0 24 24"><path d="M12 3 2 11h3v9h5v-6h4v6h5v-9h3L12 3Z"/></svg>',
    flag: '<svg viewBox="0 0 24 24"><path d="M5 3v18H3V3h2Zm2 1h13l-3 4 3 4H7V4Z"/></svg>',
    globe: '<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm6.9 6h-2.5a15 15 0 0 0-1.2-3.3A8 8 0 0 1 18.9 8ZM12 4c.8 1 1.5 2.4 1.9 4h-3.8C10.5 6.4 11.2 5 12 4ZM4.3 14a8 8 0 0 1 0-4h2.9a17 17 0 0 0 0 4H4.3Zm.8 2h2.5a15 15 0 0 0 1.2 3.3A8 8 0 0 1 5.1 16Zm2.5-8H5.1a8 8 0 0 1 3.7-3.3A15 15 0 0 0 7.6 8ZM12 20c-.8-1-1.5-2.4-1.9-4h3.8c-.4 1.6-1.1 3-1.9 4Zm2.3-6H9.7a15 15 0 0 1 0-4h4.6a15 15 0 0 1 0 4Zm.6 5.3a15 15 0 0 0 1.2-3.3h2.5a8 8 0 0 1-3.7 3.3ZM16.8 14a17 17 0 0 0 0-4h2.9a8 8 0 0 1 0 4h-2.9Z"/></svg>'
  };

  function renderPreview() {
    var p = cv.personalInfo;
    var side = [];
    if (p.photoUrl) side.push('<img class="cv-photo" src="' + p.photoUrl + '" alt="" />');

    // ── Informations personnelles (nom + coordonnées, avec icônes) ──
    var name = [p.firstName, p.lastName].filter(Boolean).join(' ');
    var loc = [p.city, p.country].filter(Boolean).join(', ');
    function crow(icon, val) { return val ? '<div class="cv-crow">' + ICO[icon] + '<span>' + esc(val) + '</span></div>' : ''; }
    var info = crow('user', name) + crow('mail', p.email) + crow('phone', p.phone) + crow('home', loc) + crow('flag', p.nationality) + crow('globe', p.website);
    if (info) side.push('<div class="blk"><h3>Informations personnelles</h3>' + info + '</div>');

    // ── Certificats ──
    if (cv.certificates.length) {
      side.push('<div class="blk"><h3>Certificats</h3>' + cv.certificates.map(function (c) {
        var sub = [c.subtitle, c.score, c.date].filter(Boolean).map(esc).join(' — ');
        return '<div class="cv-cert"><b>' + esc(c.title) + '</b>' + (sub ? '<span>' + sub + '</span>' : '') + '</div>';
      }).join('') + '</div>');
    }

    // ── Centres d'intérêt ──
    var ints = cv.interests.filter(function (i) { return i.label; });
    if (ints.length) {
      side.push('<div class="blk"><h3>Centres d’intérêt</h3>' + ints.map(function (i) {
        return '<div class="cv-int"><i></i><span>' + esc(i.label) + '</span></div>';
      }).join('') + '</div>');
    }

    // ── Langues (nom + 5 pastilles) ──
    if (cv.languages.length) {
      side.push('<div class="blk"><h3>Langues</h3>' + cv.languages.map(function (l) {
        var n = Math.max(0, Math.min(5, l.level || 0)); var dots = '';
        for (var k = 1; k <= 5; k++) dots += '<i class="' + (k <= n ? '' : 'off') + '"></i>';
        return '<div class="cv-lang"><span>' + esc(l.name) + '</span><span class="cv-dots">' + dots + '</span></div>';
      }).join('') + '</div>');
    }

    // ── Colonne principale ──
    var main = [];
    main.push('<div class="cv-name">' + (name ? esc(name) : '<span class="empty-ph">Votre nom</span>') + '</div>');
    var head = p.headline || cv.summary;
    main.push('<div class="cv-headline">' + (head ? esc(head) : '<span class="empty-ph">Titre / sous-titre</span>') + '</div>');

    function section(title, arr, fmt) {
      if (!arr.length) return '';
      return '<div class="cv-section"><h2>' + title + '</h2>' + arr.map(fmt).join('') + '</div>';
    }
    function bullets(list) {
      var b = (list || []).filter(Boolean);
      return b.length ? '<ul>' + b.map(function (x) { return '<li>' + esc(x) + '</li>'; }).join('') + '</ul>' : '';
    }
    function head2(title, inst, date, sub) {
      return '<div class="er"><div><div class="ti">' + esc(title) + '</div>'
        + (inst ? '<div class="inst">' + esc(inst) + '</div>' : '')
        + (sub ? '<div class="sub">' + esc(sub) + '</div>' : '')
        + '</div>' + (date ? '<div class="dt">' + esc(date) + '</div>' : '') + '</div>';
    }

    main.push(section('Expérience professionnelle', cv.experiences, function (e) {
      return '<div class="cv-entry">' + head2(e.title, [e.institution, e.location].filter(Boolean).join(', '), dates(e.startDate, e.endDate, e.isCurrent), '')
        + (e.description ? '<p class="desc">' + ml(e.description) + '</p>' : '') + bullets(e.bullets) + '</div>';
    }));
    main.push(section('Formation', cv.education, function (e) {
      return '<div class="cv-entry">' + head2(e.degree, [e.institution, e.location].filter(Boolean).join(', '), dates(e.startDate, e.endDate, false), '')
        + (e.description ? '<p class="desc">' + ml(e.description) + '</p>' : '') + bullets(e.bullets) + '</div>';
    }));
    main.push(section('Références', cv.references, function (r) {
      var d = [r.title, r.institution, r.location, r.phone, r.email].filter(Boolean).map(esc).join(', ');
      return '<div class="cv-ref"><b>' + esc(r.name) + '</b>' + (d ? '<span>' + d + '</span>' : '') + '</div>';
    }));
    main.push(section('Projets de Recherche Clinique', cv.researchProjects, function (e) {
      return '<div class="cv-entry">' + head2(e.title, e.institution, dates(e.startDate, e.endDate, e.isCurrent), e.department)
        + bullets(e.bullets) + '</div>';
    }));
    main.push(section('Projet Personnel', cv.personalProjects, function (e) {
      return '<div class="cv-entry"><div class="ti">' + esc(e.title) + '</div>'
        + (e.description ? '<p class="desc">' + ml(e.description) + '</p>' : '')
        + (e.url ? '<p class="desc">lien : ' + esc(e.url) + '</p>' : '') + '</div>';
    }));

    document.getElementById('sheet').innerHTML =
      '<div class="cv-side">' + side.join('') + '</div><div class="cv-main">' + main.join('') + '</div>';
  }

  function render() { renderEditor(); renderPreview(); }

  // ════════════════════════════════════════════════════════════════════════
  //  CLOUD (own-row RLS via /api/cv-docs)
  // ════════════════════════════════════════════════════════════════════════
  function api(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
    if (authToken) opts.headers.Authorization = 'Bearer ' + authToken;
    return fetch(path, opts);
  }

  function saveCloud(silent) {
    if (!authToken) { if (!silent) alert('Connecte-toi pour sauvegarder ton CV dans le cloud (sauvegarde locale active).'); return; }
    setStatus('Enregistrement…');
    var body = { document: cv, theme: 'medical' };
    if (serverId) body.id = serverId;
    var info = cv.personalInfo;
    body.title = [info.firstName, info.lastName].filter(Boolean).join(' ');
    api('/api/cv-docs', { method: 'POST', body: JSON.stringify(body) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok) { setStatus('Échec de l’enregistrement'); return; }
        serverId = res.j.id; dirty = false; saveLocal();
        setStatus('Enregistré ✓');
      })
      .catch(function () { setStatus('Hors-ligne — sauvegarde locale'); });
  }

  function openHistory() {
    if (!authToken) { alert('Connecte-toi pour retrouver tes CV enregistrés.'); return; }
    var list = document.getElementById('histList');
    list.innerHTML = '<div class="histrow">Chargement…</div>';
    document.getElementById('histModal').classList.add('open');
    api('/api/cv-docs').then(function (r) { return r.json(); }).then(function (j) {
      var items = (j && j.items) || [];
      if (!items.length) { list.innerHTML = '<div class="histrow">Aucun CV enregistré.</div>'; return; }
      list.innerHTML = '';
      items.forEach(function (it) {
        var open = el('div', { class: 'histrow' }, [
          el('span', { class: 'nm' }, [it.title || 'CV sans titre']),
          el('span', { class: 'dt' }, [new Date(it.updated_at).toLocaleDateString('fr-FR')]),
          el('button', { class: 'iconbtn danger', title: 'Supprimer' }, ['🗑'])
        ]);
        open.querySelector('.nm').addEventListener('click', function () { loadCloud(it.id); });
        open.querySelector('.dt').addEventListener('click', function () { loadCloud(it.id); });
        open.querySelector('.iconbtn').addEventListener('click', function (ev) {
          ev.stopPropagation();
          if (!confirm('Supprimer définitivement ce CV ?')) return;
          api('/api/cv-docs?id=' + it.id, { method: 'DELETE' }).then(function () { openHistory(); });
        });
        list.appendChild(open);
      });
    }).catch(function () { list.innerHTML = '<div class="histrow">Erreur de chargement.</div>'; });
  }
  function loadCloud(id) {
    api('/api/cv-docs?id=' + id).then(function (r) { return r.json(); }).then(function (j) {
      if (j && j.cv && j.cv.document) {
        cv = Object.assign(blankCv(), j.cv.document); serverId = j.cv.id;
        saveLocal(); render(); setStatus('CV chargé');
        document.getElementById('histModal').classList.remove('open');
      }
    });
  }

  // ════════════════════════════════════════════════════════════════════════
  //  PDF « distribuable » — généré côté client (jsPDF + html2canvas), SANS
  //  window.print() : aucun en-tête/pied de page navigateur (URL, n° de page),
  //  plein cadre A4 (bande latérale jusqu'aux bords), jamais de rognage à droite.
  // ════════════════════════════════════════════════════════════════════════
  function exportPdf() {
    if (!window.jspdf || !window.html2canvas) { alert('Export PDF indisponible (librairie non chargée). Réessaie dans un instant.'); return; }
    var info = cv.personalInfo;
    var fname = ('CV-' + (info.firstName || '') + '-' + (info.lastName || '')).replace(/\s+/g, '').replace(/-+$/, '') || 'CV';
    var btn = document.getElementById('btn-pdf');
    var prevLabel = btn.textContent;
    btn.disabled = true; btn.textContent = 'Génération…';

    var sheet = document.getElementById('sheet');
    var prevMinH = sheet.style.minHeight, prevShadow = sheet.style.boxShadow;
    sheet.style.boxShadow = 'none';

    // On étend la feuille à un nombre ENTIER de pages A4 pour que la bande latérale
    // (fond en dégradé de .sheet) remplisse aussi la dernière page jusqu'en bas.
    var wpx = sheet.offsetWidth;
    var pageHpx = wpx * 297 / 210;
    var pages = Math.max(1, Math.ceil((sheet.offsetHeight - 1) / pageHpx));
    sheet.style.minHeight = (pages * pageHpx) + 'px';

    var SCALE = 3; // ~288 dpi : net à l'impression
    window.html2canvas(sheet, {
      scale: SCALE, useCORS: true, backgroundColor: '#ffffff', logging: false,
      windowWidth: wpx, height: pages * pageHpx, windowHeight: pages * pageHpx,
    }).then(function (canvas) {
      sheet.style.minHeight = prevMinH; sheet.style.boxShadow = prevShadow;
      var jsPDF = window.jspdf.jsPDF;
      var pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      var imgW = canvas.width;
      var pxPerPage = Math.round(canvas.width * 297 / 210); // hauteur d'1 page en px canvas
      var total = Math.max(1, Math.round(canvas.height / pxPerPage));
      for (var p = 0; p < total; p++) {
        if (p > 0) pdf.addPage();
        var srcY = p * pxPerPage, srcH = Math.min(pxPerPage, canvas.height - srcY);
        var slice = document.createElement('canvas');
        slice.width = imgW; slice.height = pxPerPage;
        var ctx = slice.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, imgW, pxPerPage);
        ctx.drawImage(canvas, 0, srcY, imgW, srcH, 0, 0, imgW, srcH);
        pdf.addImage(slice.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297); // plein cadre
      }
      pdf.save(fname + '.pdf');
      btn.disabled = false; btn.textContent = prevLabel;
    }).catch(function (e) {
      sheet.style.minHeight = prevMinH; sheet.style.boxShadow = prevShadow;
      console.error('PDF error', e);
      alert('Échec de la génération du PDF. Réessaie.');
      btn.disabled = false; btn.textContent = prevLabel;
    });
  }

  // ════════════════════════════════════════════════════════════════════════
  //  IMPORT d'un CV existant (PDF / Word) → pré-remplissage par IA
  // ════════════════════════════════════════════════════════════════════════
  async function extractText(file) {
    var name = (file.name || '').toLowerCase();
    if (name.endsWith('.pdf') || file.type === 'application/pdf') {
      if (!window.pdfjsLib) throw new Error('Lecteur PDF non chargé.');
      var buf = await file.arrayBuffer();
      var pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
      var out = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        var pg = await pdf.getPage(i);
        var tc = await pg.getTextContent();
        out.push(tc.items.map(function (it) { return it.str; }).join(' '));
      }
      return out.join('\n');
    }
    if (name.endsWith('.docx')) {
      if (!window.mammoth) throw new Error('Lecteur Word non chargé.');
      var ab = await file.arrayBuffer();
      var res = await window.mammoth.extractRawText({ arrayBuffer: ab });
      return (res && res.value) || '';
    }
    // .txt ou autre : lecture brute
    return await file.text();
  }

  async function importCv(file) {
    if (!authToken) { alert('Connecte-toi (compte étudiant ou professionnel) pour importer un CV.'); return; }
    var btn = document.getElementById('btn-import');
    var prev = btn.textContent;
    btn.disabled = true; btn.textContent = 'Lecture…';
    try {
      var text = (await extractText(file)).replace(/␀/g, ' ').trim();
      if (text.length < 30) {
        alert('Impossible de lire le texte de ce fichier (CV scanné en image ?). Essaie un PDF « texte » ou copie-colle le contenu.');
        return;
      }
      btn.textContent = 'Analyse IA…';
      var res = await api('/api/cv-import', { method: 'POST', body: JSON.stringify({ text: text.slice(0, 24000) }) });
      var j = await res.json();
      if (!res.ok) { alert((j && j.error) || 'Échec de l’import.'); return; }
      if (!j.document) { alert('Import vide.'); return; }
      if (!confirm('Remplacer le CV actuel par le contenu importé ? (tu pourras tout corriger ensuite)')) return;
      cv = Object.assign(blankCv(), j.document);
      serverId = null; touch();
      setStatus('CV importé — vérifie et corrige les champs');
    } catch (e) {
      console.error('import error', e);
      alert('Échec de la lecture du fichier. Formats acceptés : PDF, Word (.docx), texte.');
    } finally {
      btn.disabled = false; btn.textContent = prev;
    }
  }

  // ════════════════════════════════════════════════════════════════════════
  //  RELECTURE IA
  // ════════════════════════════════════════════════════════════════════════
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
  function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); }

  var PRIVACY = 'Pour relire votre CV, seul le contenu textuel nécessaire est envoyé à un service d’IA. La photo et les coordonnées des référents ne sont pas envoyées par défaut.';

  function runReview() {
    if (!authToken) { alert('La relecture IA est réservée aux comptes vérifiés étudiant ou professionnel.'); return; }
    openDrawer();
    var body = document.getElementById('ai-body');
    body.innerHTML = '<div class="privacy">' + PRIVACY + '</div><div style="display:flex;align-items:center;gap:8px;color:var(--muted)"><span class="spinner"></span> Relecture en cours…</div>';
    api('/api/cv', { method: 'POST', body: JSON.stringify({ document: cv, includeReferenceContactDetails: false }) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok) { body.innerHTML = '<div class="issue">' + esc((res.j && res.j.error) || 'Relecture indisponible.') + '</div>'; return; }
        renderReview(res.j);
      })
      .catch(function () { body.innerHTML = '<div class="issue">Erreur réseau pendant la relecture.</div>'; });
  }

  function renderReview(rep) {
    var body = document.getElementById('ai-body');
    body.innerHTML = '';
    body.appendChild(el('div', { class: 'privacy' }, [PRIVACY]));
    var score = Math.round(rep.globalScore || 0);
    body.appendChild(el('div', { class: 'scorebar' }, [el('span', { class: 'scoreval' }, [String(score)]), el('span', { class: 'hint' }, [rep.summary || ''])]));

    (rep.blockingIssues || []).forEach(function (it) {
      body.appendChild(el('div', { class: 'issue' }, [el('b', null, [(it.section || '') + ' — ']), it.message + (it.suggestedAction ? ' → ' + it.suggestedAction : '')]));
    });

    var suggs = rep.suggestions || [];
    if (!suggs.length) { body.appendChild(el('div', { class: 'hint' }, ['Aucune suggestion : le CV semble propre. ✓'])); return; }

    suggs.forEach(function (sg) {
      var node = el('div', { class: 'sugg' });
      node.appendChild(el('div', { class: 'tags' }, [
        el('span', { class: 'tag ' + (sg.severity === 'high' ? 'high' : '') }, [sg.type || 'style']),
        el('span', { class: 'tag sec' }, [sg.section || sg.fieldPath || ''])
      ]));
      if (sg.originalText) node.appendChild(el('div', { class: 'ot' }, [sg.originalText]));
      node.appendChild(el('div', { class: 'st' }, [sg.suggestedText || '']));
      if (sg.explanation) node.appendChild(el('div', { class: 'ex' }, [sg.explanation]));
      var accept = el('button', { class: 'btn btn-accent' }, ['Accepter']);
      var refuse = el('button', { class: 'btn' }, ['Refuser']);
      accept.addEventListener('click', function () {
        var r = applyCvSuggestion(sg);
        if (r === 'changed') { alert('Le champ a été modifié depuis la relecture : suggestion non appliquée automatiquement.'); }
        else if (r === 'ok') { node.style.opacity = '.5'; accept.disabled = true; refuse.disabled = true; accept.textContent = 'Appliqué ✓'; render(); }
        else { alert('Impossible de localiser ce champ.'); }
      });
      refuse.addEventListener('click', function () { node.style.opacity = '.4'; accept.disabled = true; refuse.disabled = true; });
      node.appendChild(el('div', { class: 'acts' }, [accept, refuse]));
      body.appendChild(node);
    });
  }

  // Applique UNE suggestion : vérifie que l'original correspond encore avant d'écrire.
  function applyCvSuggestion(sg) {
    if (!sg.fieldPath) return 'missing';
    var current = getByPath(cv, sg.fieldPath);
    if (current === undefined) return 'missing';
    if (sg.originalText && String(current).trim() !== String(sg.originalText).trim()) return 'changed';
    var ok = setByPath(cv, sg.fieldPath, sg.suggestedText);
    if (!ok) return 'missing';
    dirty = true; saveLocal();
    return 'ok';
  }

  // ════════════════════════════════════════════════════════════════════════
  //  WIRING
  // ════════════════════════════════════════════════════════════════════════
  document.getElementById('btn-new').addEventListener('click', function () { if (confirm('Repartir d’un CV vierge ? (la sauvegarde locale sera remplacée)')) { cv = blankCv(); serverId = null; touch(); } });
  document.getElementById('btn-import').addEventListener('click', function () { document.getElementById('import-file').click(); });
  document.getElementById('import-file').addEventListener('change', function (ev) {
    var f = ev.target.files && ev.target.files[0];
    ev.target.value = ''; // permet de ré-importer le même fichier
    if (f) importCv(f);
  });
  document.getElementById('btn-example').addEventListener('click', example);
  document.getElementById('btn-save').addEventListener('click', function () { saveCloud(false); });
  document.getElementById('btn-history').addEventListener('click', openHistory);
  document.getElementById('btn-ai').addEventListener('click', runReview);
  document.getElementById('btn-pdf').addEventListener('click', exportPdf);
  document.getElementById('ai-close').addEventListener('click', closeDrawer);
  document.getElementById('overlay').addEventListener('click', closeDrawer);
  document.getElementById('hist-close').addEventListener('click', function () { document.getElementById('histModal').classList.remove('open'); });

  // Sauvegarde de secours au changement de page (keepalive).
  window.addEventListener('pagehide', function () { saveLocal(); });

  // ── Init ──────────────────────────────────────────────────────────────────
  if (!loadLocal()) cv = blankCv();
  render();
})();
