# MedInfo AI — Gates CI de conformité (executable compliance)
name: compliance

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev, staging, main]

jobs:
  compliance:
    name: "5 gates — safe-box"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run typecheck
      # Gate 3 (rls-isolation) lance un cluster Postgres éphémère (initdb/pg_ctl) pour
      # tester les vraies policies RLS. Garantir les binaires serveur ET l'extension pgvector
      # (les migrations versionnées incluent 0006_rag_pgvector.sql → CREATE EXTENSION vector).
      - name: "Ensure Postgres server binaries + pgvector"
        run: |
          if ! ls /usr/lib/postgresql/*/bin/initdb >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y postgresql
          fi
          PG_MAJOR="$(ls -d /usr/lib/postgresql/*/ 2>/dev/null | xargs -n1 basename | sort -nr | head -n1)"
          if [ -z "${PG_MAJOR}" ]; then
            echo "Aucune version majeure PostgreSQL trouvée sous /usr/lib/postgresql." >&2
            exit 1
          fi
          if ! ls "/usr/share/postgresql/${PG_MAJOR}/extension/vector.control" >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y "postgresql-${PG_MAJOR}-pgvector"
          fi
      - name: "Gate 1 — compliance-grep"
        run: npm run compliance:grep
      # Refonte 2026-06 (ADR-0024) : les anciens gates « refusal-regression »
      # (test:prompt-regression) et « prompt-contract » (validate:prompts) reposaient
      # sur la safe-box v1/v2 supprimée du dépôt — leurs scripts n'existent plus, ce
      # qui cassait la CI sur chaque PR. Gate 2 pointe désormais sur la suite
      # unitaire ; les gates safe-box seront réintroduits avec les couches de
      # sécurité (suivi ADR-0024).
      - name: "Gate 2 — tests unitaires"
        run: npm run test:unit
      - name: "Gate 3 — rls-isolation (vrai Postgres, isolation cross-user)"
        run: npm run test:rls
      - name: "Gate 4 — rag-license"
        run: npm run validate:rag
