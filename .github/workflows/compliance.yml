# MedInfo AI — Gates CI de conformité (executable compliance)
name: compliance

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev, staging, main]

jobs:
  compliance:
    name: "5 gates — safe-box"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run typecheck
      # Gate 3 (rls-isolation) lance un cluster Postgres éphémère (initdb/pg_ctl) pour
      # tester les vraies policies RLS. Depuis l'étape 5 RAG, les migrations requièrent aussi
      # l'extension pgvector (migration 0006 : `create extension vector`). Garantir les deux.
      - name: "Ensure Postgres server binaries + pgvector"
        run: |
          if ! ls /usr/lib/postgresql/*/bin/initdb >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y postgresql
          fi
          PG_MAJOR="$(find /usr/lib/postgresql -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -nr | head -n 1)"
          sudo apt-get update
          sudo apt-get install -y "postgresql-${PG_MAJOR}-pgvector"
      - name: "Gate 1 — compliance-grep"
        run: npm run compliance:grep
      - name: "Gate 2 — refusal-regression"
        run: npm run test:prompt-regression
      - name: "Gate 3 — rls-isolation (vrai Postgres, isolation cross-user)"
        run: npm run test:rls
      - name: "Gate 4 — prompt-contract"
        run: npm run validate:prompts
      - name: "Gate 5 — rag-license"
        run: npm run validate:rag
